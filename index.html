<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide Editor</title>
  <link rel="stylesheet" href="/src/editor.css" />
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo">Slide Editor</span>
        <select id="theme-select">
          <option value="trend-report">Trend Report (Dark)</option>
          <option value="tech-explainer">Tech Explainer (White)</option>
          <option value="anthropic">Anthropic</option>
          <option value="mckinsey">McKinsey</option>
          <option value="hbr">HBR</option>
        </select>
      </div>
      <div class="topbar-center">
        <button id="btn-undo" title="Undo">&#8592;</button>
        <button id="btn-redo" title="Redo">&#8594;</button>
        <div class="insert-menu-wrapper">
          <button id="btn-insert" title="Insert element">+ Insert</button>
          <div id="insert-menu" class="insert-menu hidden">
            <div class="insert-group">
              <div class="insert-group-label">Boxes</div>
              <button data-insert="textbox">Text Box</button>
              <button data-insert="box-solid">Solid Box</button>
              <button data-insert="box-outline">Outline Box</button>
              <button data-insert="box-glass">Glass Box</button>
              <button data-insert="callout">Callout</button>
              <button data-insert="badge">Badge</button>
              <button data-insert="circle-number">Circle</button>
            </div>
            <div class="insert-group">
              <div class="insert-group-label">Media</div>
              <button data-insert="image">Image</button>
              <button data-insert="video-youtube">YouTube</button>
              <button data-insert="video-file">Video</button>
            </div>
            <div class="insert-group">
              <div class="insert-group-label">Layout</div>
              <button data-insert="cols-2">2 Columns</button>
              <button data-insert="cols-3">3 Columns</button>
              <button data-insert="text-img">Text + Image</button>
              <button data-insert="flow">Flow Chart</button>
            </div>
            <div class="insert-group">
              <div class="insert-group-label">Text</div>
              <button data-insert="heading-h1">H1</button>
              <button data-insert="heading-h2">H2</button>
              <button data-insert="heading-h3">H3</button>
              <button data-insert="paragraph">Paragraph</button>
              <button data-insert="list">Bullet List</button>
            </div>
            <div class="insert-group">
              <div class="insert-group-label">Data</div>
              <button data-insert="stat">KPI</button>
              <button data-insert="kpi-grid">KPI Grid</button>
              <button data-insert="table">Table</button>
              <button data-insert="timeline">Timeline</button>
            </div>
          </div>
        </div>
        <button id="btn-drag-mode" class="active" title="Toggle drag mode">Free Move</button>
        <button id="btn-preview" title="Preview">Preview</button>
      </div>
      <div class="topbar-right">
        <button id="btn-import">Import Deck</button>
        <input type="file" id="file-import" accept=".html,.htm" hidden />
        <button id="btn-export-deck">Export HTML</button>
        <button id="btn-export-pptx">Export PPTX</button>
      </div>
    </header>

    <!-- Main Layout -->
    <div id="main">
      <!-- Left: Slide List -->
      <aside id="panel-slides">
        <div class="panel-header">
          <span>Slides</span>
          <button id="btn-add-slide" title="Add Slide">+</button>
        </div>
        <div id="slide-list"></div>
      </aside>

      <!-- Resize handle -->
      <div id="resize-handle-left" class="resize-handle"></div>

      <!-- Center: GrapesJS Canvas -->
      <main id="editor-area">
        <div id="gjs"></div>
      </main>

      <!-- Right: Properties + Blocks -->
      <aside id="panel-right">
        <div class="panel-tabs">
          <button class="tab" data-panel="blocks-panel">Blocks</button>
          <button class="tab active" data-panel="styles-panel">Style</button>
          <button class="tab" data-panel="traits-panel">Settings</button>
          <button class="tab" data-panel="layers-panel">Layers</button>
        </div>
        <div id="blocks-panel" class="tab-content"></div>
        <div id="styles-panel" class="tab-content active"></div>
        <div id="traits-panel" class="tab-content"></div>
        <div id="layers-panel" class="tab-content"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
